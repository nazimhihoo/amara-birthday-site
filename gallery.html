<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amara Memories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="birthdayMusic" loop preload="auto">
    <source src="birthday-music.mp3" type="audio/mpeg" />
  </audio>

  <div class="page-shell" id="pageShell">
    <div class="bg-gradient"></div>
    <div class="snow-wrap" id="snowWrap"></div>

    <div class="balloons left-balloons">
      <span class="balloon b1"></span>
      <span class="balloon b2"></span>
      <span class="balloon b3"></span>
    </div>

    <div class="balloons right-balloons">
      <span class="balloon b4"></span>
      <span class="balloon b5"></span>
      <span class="balloon b6"></span>
    </div>

    <main class="screen">
      <section class="hero">
        <p class="kicker">Memories</p>

        <h1 class="title smaller">
          <span>Amara</span> Moments 📸
        </h1>

        <p class="subtitle">
          One picture at a time, with soft transitions and better vibes.
        </p>

        <div class="memory-stage">
          <img src="amara1.jpg" alt="Memory 1" class="memory-image active" />
          <img src="amara2.jpg" alt="Memory 2" class="memory-image" />
          <img src="amara3.jpg" alt="Memory 3" class="memory-image" />
        </div>

        <p class="memory-caption" id="memoryCaption">Birthday special memory</p>

        <div class="dots-row">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <p class="question">
          Kya tum final message ke liye ready ho?
        </p>

        <div class="answer-line" id="answerArea2">
          <span class="answer yes-answer" id="yesBtn2">Yes</span>
          <span class="answer no-answer" id="noBtn2">No</span>
        </div>

        <p class="feedback" id="feedback2">Message skip karna sahi idea nahi lag raha 😌</p>
      </section>
    </main>
  </div>

  <script>
    const music = document.getElementById("birthdayMusic");
    music.volume = 0.5;

    async function tryStartMusic() {
      try {
        await music.play();
      } catch (e) {
        const startOnFirstTouch = async () => {
          try { await music.play(); } catch (_) {}
          document.removeEventListener("click", startOnFirstTouch);
          document.removeEventListener("touchstart", startOnFirstTouch);
        };
        document.addEventListener("click", startOnFirstTouch, { once: true });
        document.addEventListener("touchstart", startOnFirstTouch, { once: true });
      }
    }
    tryStartMusic();

    const snowWrap = document.getElementById("snowWrap");
    for (let i = 0; i < 30; i++) {
      const flake = document.createElement("span");
      flake.className = "snowflake";
      flake.style.left = Math.random() * 100 + "%";
      flake.style.animationDuration = (7 + Math.random() * 8) + "s";
      flake.style.animationDelay = (Math.random() * 6) + "s";
      flake.style.opacity = 0.25 + Math.random() * 0.5;
      flake.style.transform = `scale(${0.6 + Math.random()})`;
      snowWrap.appendChild(flake);
    }

    const shell = document.getElementById("pageShell");

    function goToPage(url) {
      shell.classList.add("page-out");
      setTimeout(() => {
        window.location.href = url;
      }, 380);
    }

    const slides = document.querySelectorAll(".memory-image");
    const dots = document.querySelectorAll(".dot");
    const memoryCaption = document.getElementById("memoryCaption");

    const captions = [
      "Birthday special memory",
      "A soft happy moment",
      "Pretty surprise vibes"
    ];

    let currentSlide = 0;

    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.toggle("active", i === index);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
      });

      memoryCaption.textContent = captions[index];
      currentSlide = index;
    }

    function nextSlide() {
      let next = currentSlide + 1;
      if (next >= slides.length) next = 0;
      showSlide(next);
    }

    setInterval(nextSlide, 2800);
