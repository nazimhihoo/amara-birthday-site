<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amara Memories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="gallery-page">
  <audio id="birthdayMusic" autoplay loop>
    <source src="birthday-music.mp3" type="audio/mpeg" />
  </audio>

  <div class="page-shell" id="pageShell">
    <div class="floating-balloons">
      <span class="balloon balloon-1"></span>
      <span class="balloon balloon-2"></span>
      <span class="balloon balloon-3"></span>
      <span class="balloon balloon-4"></span>
      <span class="balloon balloon-5"></span>
      <span class="balloon balloon-6"></span>
    </div>

    <div class="snow-wrap" id="snowWrap"></div>

    <main class="screen">
      <section class="hero-block">
        <p class="top-kicker">Memories</p>

        <h1 class="main-title memories-title">
          <span>Amara</span> Moments 📸
        </h1>

        <p class="main-subtitle">
          One picture at a time. Smooth transition. Soft vibe. Proper special feeling.
        </p>

        <div class="memory-stage">
          <img src="amara1.jpg" alt="Amara Memory 1" class="memory-image active" />
          <img src="amara2.jpg" alt="Amara Memory 2" class="memory-image" />
          <img src="amara3.jpg" alt="Amara Memory 3" class="memory-image" />
        </div>

        <p class="memory-caption" id="memoryCaption">Birthday special memory</p>

        <div class="dots-row">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="question-line">
          Ab batao... kya tum final message ke liye ready ho?
        </div>

        <div class="answer-line" id="answerArea2">
          <span class="answer yes-answer" id="yesBtn2">Yes</span>
          <span class="answer no-answer" id="noBtn2">No</span>
        </div>

        <p class="response-line" id="responseLine2">
          Message skip karna sahi idea nahi lag raha 😌
        </p>
      </section>
    </main>
  </div>

  <script>
    const music = document.getElementById("birthdayMusic");
    music.volume = 0.5;

    const shell = document.getElementById("pageShell");
    const snowWrap = document.getElementById("snowWrap");

    for (let i = 0; i < 34; i++) {
      const snow = document.createElement("span");
      snow.className = "snowflake";
      snow.style.left = Math.random() * 100 + "%";
      snow.style.animationDuration = (7 + Math.random() * 10) + "s";
      snow.style.animationDelay = (Math.random() * 8) + "s";
      snow.style.opacity = 0.25 + Math.random() * 0.55;
      snow.style.transform = `scale(${0.6 + Math.random() * 1.2})`;
      snowWrap.appendChild(snow);
    }

    function goToPage(url) {
      shell.classList.add("page-out");
      setTimeout(() => {
        window.location.href = url;
      }, 380);
    }

    const slides = document.querySelectorAll(".memory-image");
    const dots = document.querySelectorAll(".dot");
    const caption = document.getElementById("memoryCaption");

    const captions = [
      "Birthday special memory",
      "A soft happy moment",
      "Pretty surprise vibes"
    ];

    let currentSlide = 0;

    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.toggle("active", i === index);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
      });

      caption.textContent = captions[index];
      currentSlide = index;
    }

    function nextSlide() {
      let next = currentSlide + 1;
      if (next >= slides.length) next = 0;
      showSlide(next);
    }

    setInterval(nextSlide, 2800);

    const answerArea2 = document.getElementById("answerArea2");
    const yesBtn2 = document.getElementById("yesBtn2");
    const noBtn2 = document.getElementById("noBtn2");
    const responseLine2 = document.getElementById("responseLine2");

    let noCount2 = 0;
    const noTexts2 = [
      "No",
      "Again no?",
      "Still no?",
      "Why no?",
      "Pakka no?",
      "Last no?"
    ];

    yesBtn2.addEventListener("click", () => {
      responseLine2.textContent = "The final message is opening 💐";
      goToPage("message.html");
    });

    noBtn2.addEventListener("click", () => {
      noCount2++;

      const index = Math.min(noCount2, noTexts2.length - 1);
      noBtn2.textContent = noTexts2[index];

      const areaWidth = answerArea2.clientWidth;
      const areaHeight = answerArea2.clientHeight;
      const btnWidth = Math.max(62, 92 - noCount2 * 6);
      const btnHeight = Math.max(26, 36 - noCount2 * 2);

      noBtn2.style.width = btnWidth + "px";
      noBtn2.style.height = btnHeight + "px";
      noBtn2.style.fontSize = Math.max(0.72, 0.98 - noCount2 * 0.05) + "rem";

      const maxX = Math.max(8, areaWidth - btnWidth - 8);
      const maxY = Math.max(8, areaHeight - btnHeight - 8);

      const x = Math.floor(Math.random() * maxX);
      const y = Math.floor(Math.random() * maxY);

      noBtn2.style.left = x + "px";
      noBtn2.style.top = y + "px";
      noBtn2.style.transform = "none";

      responseLine2.textContent = "No button bhi shayad message se bach nahi pa raha 😏";
    });
  </script>
</body>
</html>
