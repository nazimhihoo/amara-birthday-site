<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Amara</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="birthdayMusic" loop preload="auto">
    <source src="birthday-music.mp3" type="audio/mpeg" />
  </audio>

  <div class="page-shell" id="pageShell">
    <div class="bg-gradient"></div>
    <div class="snow-wrap" id="snowWrap"></div>

    <div class="balloons left-balloons">
      <span class="balloon b1"></span>
      <span class="balloon b2"></span>
      <span class="balloon b3"></span>
    </div>

    <div class="balloons right-balloons">
      <span class="balloon b4"></span>
      <span class="balloon b5"></span>
      <span class="balloon b6"></span>
    </div>

    <main class="screen">
      <section class="hero">
        <p class="kicker">Birthday Special</p>

        <h1 class="title">
          Happy Birthday
          <span>Amara Shaha</span>
          🎉
        </h1>

        <p class="subtitle">
          A soft little surprise, made specially for you.
        </p>

        <p class="typing-line">
          <span id="typedText"></span><span class="cursor">|</span>
        </p>

        <div class="hero-image-wrap">
          <img src="birthday-banner.png" alt="Birthday Banner" class="hero-image" />
        </div>

        <p class="question">
          Kya tumne apne bhai se aisa surprise expect kiya tha?
        </p>

        <div class="answer-line" id="answerArea1">
          <span class="answer yes-answer" id="yesBtn1">Yes</span>
          <span class="answer no-answer" id="noBtn1">No</span>
        </div>

        <p class="feedback" id="feedback1">Sach sach jawab dena 😌</p>
      </section>
    </main>
  </div>

  <script>
    const music = document.getElementById("birthdayMusic");
    music.volume = 0.5;

    async function tryStartMusic() {
      try {
        await music.play();
      } catch (e) {
        const startOnFirstTouch = async () => {
          try { await music.play(); } catch (_) {}
          document.removeEventListener("click", startOnFirstTouch);
          document.removeEventListener("touchstart", startOnFirstTouch);
        };
        document.addEventListener("click", startOnFirstTouch, { once: true });
        document.addEventListener("touchstart", startOnFirstTouch, { once: true });
      }
    }
    tryStartMusic();

    const snowWrap = document.getElementById("snowWrap");
    for (let i = 0; i < 30; i++) {
      const flake = document.createElement("span");
      flake.className = "snowflake";
      flake.style.left = Math.random() * 100 + "%";
      flake.style.animationDuration = (7 + Math.random() * 8) + "s";
      flake.style.animationDelay = (Math.random() * 6) + "s";
      flake.style.opacity = 0.25 + Math.random() * 0.5;
      flake.style.transform = `scale(${0.6 + Math.random()})`;
      snowWrap.appendChild(flake);
    }

    const lines = [
      "A special birthday surprise ✨",
      "Soft vibes, pretty moments 💖",
      "Made with warm wishes 🌸"
    ];

    const typedText = document.getElementById("typedText");
    let lineIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function typeEffect() {
      const current = lines[lineIndex];

      if (!deleting) {
        typedText.textContent = current.slice(0, charIndex + 1);
        charIndex++;
        if (charIndex === current.length) {
          deleting = true;
          setTimeout(typeEffect, 1000);
          return;
        }
      } else {
        typedText.textContent = current.slice(0, charIndex - 1);
        charIndex--;
        if (charIndex === 0) {
          deleting = false;
          lineIndex = (lineIndex + 1) % lines.length;
        }
      }

      setTimeout(typeEffect, deleting ? 38 : 68);
    }
    typeEffect();

    const shell = document.getElementById("pageShell");
    const yesBtn1 = document.getElementById("yesBtn1");
    const noBtn1 = document.getElementById("noBtn1");
    const answerArea1 = document.getElementById("answerArea1");
    const feedback1 = document.getElementById("feedback1");

    let noCount1 = 0;
    const noTexts1 = ["No", "Really?", "Still no?", "Pakka?", "Sure?", "No again?"];

    function goToPage(url) {
      shell.classList.add("page-out");
      setTimeout(() => {
        window.location.href = url;
      }, 380);
    }

    yesBtn1.addEventListener("click", () => {
      feedback1.textContent = "Opening memories... ✨";
      goToPage("gallery.html");
    });

    noBtn1.addEventListener("click", () => {
      noCount1++;
      noBtn1.textContent = noTexts1[Math.min(noCount1, noTexts1.length - 1)];

      const areaWidth = answerArea1.clientWidth;
      const areaHeight = answerArea1.clientHeight;

      const width = Math.max(58, 88 - noCount1 * 5);
      const font = Math.max(0.72, 1 - noCount1 * 0.05);

      noBtn1.style.width = width + "px";
      noBtn1.style.fontSize = font + "rem";

      const maxX = Math.max(12, areaWidth - width - 10);
      const minY = 8;
      const maxY = Math.max(16, areaHeight - 34);

      const x = Math.floor(Math.random() * maxX);
      const y = Math.floor(Math.random() * (maxY - minY + 1)) + minY;

      noBtn1.style.left = x + "px";
      noBtn1.style.top = y + "px";
      noBtn1.style.transform = "none";

      feedback1.textContent = "Hmm... jawab interesting ho raha hai 😏";
    });
  </script>
</body>
</html>
