<!DOCTYPE html>
<html>
<head>
<title>Amara Birthday</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="music" autoplay loop>
  <source src="birthday-music.mp3">
</audio>

<div class="page">

  <h1>Happy Birthday <span>Amara</span> 🎉</h1>

  <img src="birthday-banner.png" class="hero">

  <p class="question">
    Kya tumne apne bhai se aisa surprise expect kiya tha? 😌
  </p>

  <div class="choices">
    <span class="yes" onclick="goNext()">YES</span>
    <span class="no" id="noBtn">NO</span>
  </div>

</div>

<script>
const music = document.getElementById("music");
music.volume = 0.5;

let noBtn = document.getElementById("noBtn");
let noCount = 0;

let texts = [
  "NO",
  "Really NO?",
  "Soch lo 😏",
  "Still NO?",
  "Sure? 😂",
  "Ab bhi NO?",
  "Zyada ho gaya 😭"
];

noBtn.onclick = () => {
  noCount++;

  // change text
  noBtn.innerText = texts[Math.min(noCount, texts.length-1)];

  // random move
  let x = Math.random() * 300 - 150;
  let y = Math.random() * 200 - 100;

  noBtn.style.transform = `translate(${x}px, ${y}px) scale(${1 - noCount*0.1})`;

  // shrink
  noBtn.style.fontSize = (18 - noCount*2) + "px";
};

function goNext(){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    window.location.href = "gallery.html";
  }, 400);
}
</script>

</body>
</html>
